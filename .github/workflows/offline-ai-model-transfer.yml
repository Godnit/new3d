name: Offline AI Model Transfer

on:
  push:
    paths:
      - '.github/workflows/offline-ai-model-transfer.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  download-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download real Qwen GGUF model
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p model
          curl -L --fail --retry 5 --retry-delay 5 \
            -o model/qwen2.5-0.5b-instruct-q4_k_m.gguf \
            'https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf?download=true'
          test -s model/qwen2.5-0.5b-instruct-q4_k_m.gguf
          sha256sum model/qwen2.5-0.5b-instruct-q4_k_m.gguf > model/SHA256SUMS.txt
          cat > model/README_AR.txt <<'EOF'
          نموذج محادثة حقيقي يعمل دون إنترنت بعد دمجه مع llama.cpp أو مكتبة Android تدعم GGUF.
          الاسم: Qwen2.5-0.5B-Instruct GGUF Q4_K_M
          المصدر: Qwen على Hugging Face
          الترخيص: Apache-2.0
          هذا النموذج للنص والمحادثة، وليس لتحليل الصور.
          EOF

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen2.5-0.5b-instruct-q4_k_m
          path: model/
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
