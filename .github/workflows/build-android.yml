name: Build City Quest 3D GLES2 for Android 8.1

on:
  push:
    branches: [cityquest3d-legacy-tabs-v2]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip wget git libgl1 libpulse0 xvfb python3-pil

      - name: Add three lightweight real 3D models
        run: |
          set -euxo pipefail
          rm -rf godot3/assets /tmp/city-models /tmp/car-models
          mkdir -p godot3/assets/city godot3/assets/cars godot3/assets/characters
          git clone --depth 1 https://github.com/immaculate-lift-studio/CityCrafter3D.git /tmp/city-models
          git clone --depth 1 https://github.com/Arslan12216775/kenney_car-kit.git /tmp/car-models
          wget -q -O godot3/assets/characters/CesiumMan.glb "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CesiumMan/glTF-Binary/CesiumMan.glb"
          python3 - <<'PY'
          from pathlib import Path
          import json
          import shutil

          city_source = Path('/tmp/city-models/addons/citycrafter/assets/example_assets/kenney_city-kit-commercial_20/Models/OBJ format')
          buildings = [p for p in city_source.rglob('*.obj') if any(k in p.name.lower() for k in ('building', 'skyscraper', 'shop', 'house'))]
          assert buildings, 'No building model found'
          building = min(buildings, key=lambda p: p.stat().st_size)
          building_dest = Path('godot3/assets/city') / building.name
          shutil.copy2(building, building_dest)
          if building.with_suffix('.mtl').exists():
              shutil.copy2(building.with_suffix('.mtl'), building_dest.with_suffix('.mtl'))

          car_source = Path('/tmp/car-models')
          cars = [p for p in car_source.rglob('*.obj') if any(k in p.name.lower() for k in ('car', 'sedan', 'taxi', 'racer', 'vehicle'))]
          assert cars, 'No car OBJ found'
          car = min(cars, key=lambda p: p.stat().st_size)
          car_dest = Path('godot3/assets/cars') / car.name
          shutil.copy2(car, car_dest)
          if car.with_suffix('.mtl').exists():
              shutil.copy2(car.with_suffix('.mtl'), car_dest.with_suffix('.mtl'))

          manifest = {
              'city': ['res://' + building_dest.relative_to('godot3').as_posix()],
              'cars': ['res://' + car_dest.relative_to('godot3').as_posix()],
              'characters': ['res://assets/characters/CesiumMan.glb'],
          }
          Path('godot3/assets/model_manifest.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2))
          print(json.dumps(manifest, indent=2))
          PY
          find godot3/assets -type f -printf '%p %s bytes\n'

      - name: Write licenses
        run: |
          printf '%s\n' '# Third-party assets' '' '- Kenney City Kit — CC0 1.0.' '- Kenney Car Kit — CC0 1.0.' '- CesiumMan from KhronosGroup glTF Sample Assets — CC-BY 4.0.' '- Godot Engine 3.5.3 runtime — MIT License.' > godot3/THIRD_PARTY_LICENSES.md

      - name: Install Godot 3.5.3 and export templates
        run: |
          set -euxo pipefail
          wget -q -O /tmp/godot3.zip "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_x11.64.zip"
          wget -q -O /tmp/godot3-templates.tpz "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz"
          unzip -q /tmp/godot3.zip -d /tmp/godot3-bin
          sudo install -m 0755 /tmp/godot3-bin/Godot_v3.5.3-stable_x11.64 /usr/local/bin/godot3
          mkdir -p "$HOME/.local/share/godot/templates/3.5.3.stable" /tmp/godot3-templates
          unzip -q /tmp/godot3-templates.tpz -d /tmp/godot3-templates
          cp -a /tmp/godot3-templates/templates/. "$HOME/.local/share/godot/templates/3.5.3.stable/"
          godot3 --version

      - name: Generate Android debug signing key
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey -keypass android -dname "CN=Android Debug,O=City Quest GLES2,C=US" -keyalg RSA -keysize 2048 -validity 10000

      - name: Import assets and smoke-test GLES2 direct start
        run: |
          set -o pipefail
          timeout 7m xvfb-run -a godot3 --path godot3 --editor --quit 2>&1 | tee godot3-import.log || true
          if grep -E "SCRIPT ERROR|Parse Error|Failed to load script" godot3-import.log; then exit 1; fi
          timeout 20s xvfb-run -a godot3 --path godot3 2>&1 | tee godot3-smoke.log || true
          if grep -E "SCRIPT ERROR|Parse Error|Failed to load script|Failed loading resource" godot3-smoke.log; then exit 1; fi
          grep -q "CITYQUEST_READY gles2_direct" godot3-smoke.log

      - name: Export phone and emulator APKs
        run: |
          mkdir -p build
          xvfb-run -a godot3 --path godot3 --export-debug "Android Phone GLES2" "$GITHUB_WORKSPACE/build/CityQuest3D-GLES2.apk" 2>&1 | tee godot3-export-phone.log
          xvfb-run -a godot3 --path godot3 --export-debug "Android Emulator GLES2" "$GITHUB_WORKSPACE/build/CityQuest3D-GLES2-Emulator.apk" 2>&1 | tee godot3-export-emulator.log
          test -s build/CityQuest3D-GLES2.apk
          test -s build/CityQuest3D-GLES2-Emulator.apk
          unzip -t build/CityQuest3D-GLES2.apk
          keytool -printcert -jarfile build/CityQuest3D-GLES2.apk > build/signature.txt
          sha256sum build/CityQuest3D-GLES2.apk | tee build/SHA256SUMS.txt
          zip -qr build/CityQuest3D-GLES2-Source.zip godot3 tools/validate_android_screens.py

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          sudo chmod 666 /dev/kvm || true

      - name: Install and play on Android 8.1 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 27
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-options: -no-snapshot -no-window -no-audio -no-boot-anim -camera-back none -gpu swiftshader_indirect
          script: |
            set -euxo pipefail
            adb install -r build/CityQuest3D-GLES2-Emulator.apk
            adb shell settings put secure immersive_mode_confirmations confirmed || true
            adb logcat -c
            adb shell monkey -p com.godnit.cityquest3dgles2 -c android.intent.category.LAUNCHER 1
            sleep 15
            adb shell pidof com.godnit.cityquest3dgles2 | tr -d '\r' > /tmp/cityquest.pid
            test -s /tmp/cityquest.pid
            adb exec-out screencap -p > build/android81-start.png
            adb shell input swipe 225 860 225 665 1400
            sleep 5
            adb exec-out screencap -p > build/android81-playing.png
            adb logcat -d > build/android81-logcat.txt
            if grep -E "FATAL EXCEPTION|Fatal signal|ANR in com.godnit.cityquest3dgles2|Program linking failed|GL_MAX_FRAGMENT_UNIFORM" build/android81-logcat.txt; then exit 1; fi
            cp build/android81-start.png build/android81-menu.png
            cp build/android81-playing.png build/android81-game.png
            python3 tools/validate_android_screens.py
            cp build/android81-playing.png build/CityQuest3D-GLES2-Preview.png

      - name: Upload tested game
        uses: actions/upload-artifact@v4
        with:
          name: CityQuest3D-GLES2-Ready
          path: |
            build/CityQuest3D-GLES2.apk
            build/CityQuest3D-GLES2-Source.zip
            build/CityQuest3D-GLES2-Preview.png
            build/android81-start.png
            build/android81-playing.png
            build/android81-logcat.txt
            build/SHA256SUMS.txt
            build/signature.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CityQuest3D-GLES2-Diagnostics
          path: |
            godot3-import.log
            godot3-smoke.log
            godot3-export-phone.log
            godot3-export-emulator.log
            build/android81-logcat.txt
            build/android81-start.png
            build/android81-playing.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish delivery files
        if: always()
        run: |
          set -euxo pipefail
          rm -rf /tmp/cityquest-delivery
          mkdir -p /tmp/cityquest-delivery/diagnostics
          printf '%s\n' "run_id=${{ github.run_id }}" "head_sha=${{ github.sha }}" "job_status=${{ job.status }}" 'engine=Godot 3.5.3 GLES2' 'android_test=API 27 / Android 8.1 direct play' "completed_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/cityquest-delivery/STATUS.txt
          cp build/CityQuest3D-GLES2.apk /tmp/cityquest-delivery/ 2>/dev/null || true
          cp build/CityQuest3D-GLES2-Source.zip /tmp/cityquest-delivery/ 2>/dev/null || true
          cp build/CityQuest3D-GLES2-Preview.png /tmp/cityquest-delivery/ 2>/dev/null || true
          cp build/android81-start.png /tmp/cityquest-delivery/ 2>/dev/null || true
          cp build/android81-playing.png /tmp/cityquest-delivery/ 2>/dev/null || true
          cp build/SHA256SUMS.txt /tmp/cityquest-delivery/ 2>/dev/null || true
          cp build/signature.txt /tmp/cityquest-delivery/ 2>/dev/null || true
          cp godot3-import.log godot3-smoke.log godot3-export-phone.log godot3-export-emulator.log /tmp/cityquest-delivery/diagnostics/ 2>/dev/null || true
          cp build/android81-logcat.txt /tmp/cityquest-delivery/diagnostics/ 2>/dev/null || true
          find /tmp/cityquest-delivery -type f -printf '%P\t%s bytes\n' | sort > /tmp/cityquest-delivery/FILES.txt
          git config user.name "City Quest Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout --orphan delivery-work
          git rm -rf . || true
          cp -a /tmp/cityquest-delivery/. .
          git add -A
          git commit -m "Publish City Quest GLES2 run ${{ github.run_id }}"
          git push origin HEAD:cityquest3d-delivery --force
