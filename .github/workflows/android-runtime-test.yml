name: Inspect GLES2 Android 8.1 Run

on:
  push:
    branches: [cityquest3d-legacy-tabs-v2]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture failed emulator step
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: "29521039350"
        run: |
          mkdir -p /tmp/cityquest-monitor
          gh run view "$RUN_ID" --repo "${{ github.repository }}" > /tmp/cityquest-monitor/RUN_VIEW.txt 2>&1 || true
          gh run view "$RUN_ID" --repo "${{ github.repository }}" --log-failed > /tmp/cityquest-monitor/FAILED_LOG.txt 2>&1 || true
          printf '%s\n' "inspected_run_id=$RUN_ID" "monitor_run_id=${{ github.run_id }}" "head_sha=${{ github.sha }}" > /tmp/cityquest-monitor/STATUS.txt
          tail -n 300 /tmp/cityquest-monitor/FAILED_LOG.txt || true

      - name: Publish diagnostic log
        run: |
          git config user.name "City Quest Monitor"
          git config user.email "actions@users.noreply.github.com"
          git checkout --orphan monitor-work
          git rm -rf . || true
          cp -a /tmp/cityquest-monitor/. .
          git add -A
          git commit -m "Publish GLES2 emulator failure log ${{ github.run_id }}"
          git push origin HEAD:cityquest3d-monitor --force
