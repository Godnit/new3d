name: Trigger City Quest 3D Legacy Build

on:
  push:
    branches: [cityquest3d-legacy-tabs-v2]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch-full-build:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Android 8.1 and Web validation
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build-android.yml --repo "${{ github.repository }}" --ref cityquest3d-legacy-tabs-v2
