name: Monitor City Quest Direct Build

on:
  push:
    branches: [cityquest3d-legacy-tabs-v2]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture latest build runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 35
          mkdir -p /tmp/cityquest-monitor
          gh run list --repo "${{ github.repository }}" --workflow build-android.yml --branch cityquest3d-legacy-tabs-v2 --limit 10 --json databaseId,name,status,conclusion,event,headSha,createdAt,url > /tmp/cityquest-monitor/RUNS.json
          printf '%s\n' "monitor_run_id=${{ github.run_id }}" "head_sha=${{ github.sha }}" "captured_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/cityquest-monitor/STATUS.txt
          cat /tmp/cityquest-monitor/RUNS.json

      - name: Publish monitor data
        run: |
          git config user.name "City Quest Monitor"
          git config user.email "actions@users.noreply.github.com"
          git checkout --orphan monitor-work
          git rm -rf . || true
          cp -a /tmp/cityquest-monitor/. .
          git add -A
          git commit -m "Publish direct build monitor ${{ github.run_id }}"
          git push origin HEAD:cityquest3d-monitor --force
