name: Build Nebras Offline AI APK

on:
  push:
    branches: ["offline-ai-android"]
    paths:
      - "android-offline-ai/**"
      - ".github/workflows/build-offline-ai.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "android-offline-ai/**"
      - ".github/workflows/build-offline-ai.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Cache embedded AI models
        uses: actions/cache@v4
        with:
          path: .model-cache
          key: nebras-models-v2-qwen25-05b-q8-efficientnet-lite0

      - name: Download embedded AI models
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .model-cache
          mkdir -p android-offline-ai/app/src/main/assets/models

          QWEN_FILE=.model-cache/qwen-0.5b.task
          QWEN_URL='https://huggingface.co/litert-community/Qwen2.5-0.5B-Instruct/resolve/main/Qwen2.5-0.5B-Instruct_multi-prefill-seq_q8_ekv1280.task?download=true'
          QWEN_SHA='e608953f169aeb1bd7b9155fec2559825e08453fc209b84eda3a781ed0452fd2'

          if [ ! -f "$QWEN_FILE" ]; then
            curl --fail --location --retry 5 --retry-delay 5 \
              --output "$QWEN_FILE" "$QWEN_URL"
          fi
          echo "$QWEN_SHA  $QWEN_FILE" | sha256sum --check

          VISION_FILE=.model-cache/efficientnet-lite0.tflite
          VISION_URL='https://storage.googleapis.com/mediapipe-models/image_classifier/efficientnet_lite0/float32/1/efficientnet_lite0.tflite'
          if [ ! -s "$VISION_FILE" ]; then
            curl --fail --location --retry 5 --retry-delay 5 \
              --output "$VISION_FILE" "$VISION_URL"
          fi

          cp "$QWEN_FILE" android-offline-ai/app/src/main/assets/models/qwen-0.5b.task
          cp "$VISION_FILE" android-offline-ai/app/src/main/assets/models/efficientnet-lite0.tflite
          du -h android-offline-ai/app/src/main/assets/models/*

      - name: Harden 32-bit image fallback
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("android-offline-ai/app/src/main/java/com/ayman/offlineai/MainActivity.java")
          text = path.read_text(encoding="utf-8")
          old = "} catch (Exception ignored) {\n            visionAvailable = false;"
          new = "} catch (Throwable ignored) {\n            visionAvailable = false;"
          if old not in text:
              raise SystemExit("Expected vision fallback block was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Build APK
        id: build
        continue-on-error: true
        working-directory: android-offline-ai
        shell: bash
        run: |
          set -o pipefail
          gradle :app:assembleRelease --stacktrace --no-daemon 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NebrasAI-build-log
          path: android-offline-ai/build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Rename APK
        if: steps.build.outcome == 'success'
        run: |
          cp android-offline-ai/app/build/outputs/apk/release/app-release.apk NebrasAI-Android8-Ready.apk
          ls -lh NebrasAI-Android8-Ready.apk

      - name: Upload ready APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: NebrasAI-Android8-Ready-APK
          path: NebrasAI-Android8-Ready.apk
          if-no-files-found: error
          retention-days: 30

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
