name: Build Offline Quran APK

on:
  workflow_dispatch:
  push:
    branches: ["agent/offline-quran-apk-v1"]
    paths:
      - "quran-offline/**"
      - ".github/workflows/quran-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Download verified offline assets
        run: |
          set -euxo pipefail
          mkdir -p quran-offline/app/src/main/assets
          curl -fL --retry 3 "https://cdn.jsdelivr.net/npm/quran-json@3.1.2/dist/quran.json" -o quran-offline/app/src/main/assets/quran.json
          curl -fL --retry 3 "https://unpkg.com/adhan@4.4.4/lib/bundles/adhan.umd.min.js" -o quran-offline/app/src/main/assets/adhan.umd.min.js
          python3 - <<'PY'
          import json
          p='quran-offline/app/src/main/assets/quran.json'
          d=json.load(open(p,encoding='utf-8'))
          assert isinstance(d,list) and len(d)==114, f'Expected 114 surahs, got {len(d)}'
          count=sum(len(s.get('verses',[])) for s in d)
          assert count==6236, f'Expected 6236 verses, got {count}'
          print('Validated:',len(d),'surahs and',count,'verses')
          PY
      - name: Build APK
        working-directory: quran-offline
        run: gradle :app:assembleDebug --stacktrace
      - name: Check APK size
        run: |
          APK=quran-offline/app/build/outputs/apk/debug/app-debug.apk
          test -f "$APK"
          SIZE=$(stat -c%s "$APK")
          echo "APK bytes: $SIZE"
          test "$SIZE" -lt 104857600
          cp "$APK" Quran-Offline-v1.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Quran-Offline-v1-APK
          path: Quran-Offline-v1.apk
          retention-days: 30
