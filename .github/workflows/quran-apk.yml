name: Build Rafiq Al-Huda v4.14 Compact Downloadable Audio APK

on:
  workflow_dispatch:
  push:
    branches: ["develop/rafiq-alhuda-v49-compact"]
    paths:
      - "quran-offline/**"
      - ".github/workflows/quran-apk.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "quran-offline/**"
      - ".github/workflows/quran-apk.yml"

concurrency:
  group: rafiq-v414-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install build tools
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          sudo apt-get update -qq
          sudo apt-get install -y unzip ffmpeg
          python3 -m pip install --disable-pip-version-check pillow

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Apply v4.14 native patches
        run: |
          set -euxo pipefail
          python3 quran-offline/scripts/prepare_v414.py
          grep -q 'AudioDownloadServiceV414' quran-offline/app/src/main/java/com/mastermedia/quranoffline/MainActivityV410.java
          grep -q 'AudioDownloadServiceV414.audioFile' quran-offline/app/src/main/java/com/mastermedia/quranoffline/AudioServiceV410.java
          grep -q 'COMPASS_DISPATCH_INTERVAL_MS = 35L' quran-offline/app/src/main/java/com/mastermedia/quranoffline/MainActivityV410.java
          grep -q "return 'mushaf-pages/page'" quran-offline/app/src/main/assets/app-v11.js

      - name: Prepare compact Quran, Mushaf, hadith and adhan
        shell: bash
        run: |
          set -euxo pipefail
          ASSETS="quran-offline/app/src/main/assets"
          RAW="quran-offline/app/src/main/res/raw"
          DATA="quran-offline/build-data"
          PAGES="$DATA/pages"
          QCF="$DATA/qcf-pages"
          HADITH="$DATA/hadith"
          MUSHAF="$ASSETS/mushaf-pages"
          TMP="$DATA/mushaf-source"
          mkdir -p "$ASSETS/fonts" "$RAW" "$PAGES" "$QCF" "$HADITH" "$MUSHAF" "$TMP"
          rm -f "$PAGES"/*.json "$QCF"/*.json "$MUSHAF"/* "$RAW/adhan_short.ogg"
          rm -rf "$ASSETS/mushaf-pages-blue" "$ASSETS/mushaf-pages-gold" "$TMP"/*

          curl -fsSL --retry 5 "https://cdn.jsdelivr.net/npm/quran-json@3.1.2/dist/quran.json" -o "$ASSETS/quran.json"
          curl -fsSL --retry 5 "https://unpkg.com/adhan@4.4.4/lib/bundles/adhan.umd.min.js" -o "$ASSETS/adhan.umd.min.js"

          export PAGES QCF
          seq 1 604 | xargs -P 24 -I{} bash -c 'curl -fsSL --retry 5 "https://cdn.jsdelivr.net/gh/fawazahmed0/quran-api@1/editions/ara-quranacademy/pages/{}.json" -o "$PAGES/{}.json"'
          seq 1 604 | xargs -P 16 -I{} bash -c 'curl -fsSL --retry 5 "https://api.quran.com/api/v4/verses/by_page/{}?language=ar&words=true&word_fields=text_qpc_hafs,text_uthmani&fields=juz_number&per_page=50" -o "$QCF/{}.json"'
          test "$(find "$PAGES" -name '*.json' | wc -l)" -eq 604
          test "$(find "$QCF" -name '*.json' | wc -l)" -eq 604

          curl -fL --retry 6 --retry-all-errors "https://quran.islam-db.com/public/data/pages/quranpages_800.zip" -o "$TMP/mushaf.zip"
          unzip -q "$TMP/mushaf.zip" -d "$TMP/extracted"
          SRC=$(dirname "$(find "$TMP/extracted" -type f -name page001.png | head -1)")
          test -n "$SRC"
          python3 quran-offline/scripts/build_mushaf_images.py --source "$SRC" --destination "$MUSHAF"
          test "$(find "$MUSHAF" -name 'page*.webp' | wc -l)" -eq 604

          curl -fL --retry 6 --retry-all-errors "https://commons.wikimedia.org/wiki/Special:Redirect/file/Oraci%C3%B3n%20Al-Azzan.ogg" -o "$RAW/adhan_short.ogg"
          curl -fsSL --retry 5 "https://verses.quran.foundation/fonts/quran/hafs/uthmanic_hafs/UthmanicHafs1Ver18.ttf" -o "$ASSETS/fonts/UthmanicHafs1Ver18.ttf"

          BASE="https://raw.githubusercontent.com/AhmedBaset/hadith-json/v1.2.0/db/by_book"
          curl -fsSL --retry 5 "$BASE/the_9_books/bukhari.json" -o "$HADITH/bukhari.json"
          curl -fsSL --retry 5 "$BASE/the_9_books/muslim.json" -o "$HADITH/muslim.json"
          curl -fsSL --retry 5 "$BASE/forties/nawawi40.json" -o "$HADITH/nawawi40.json"
          curl -fsSL --retry 5 "$BASE/forties/qudsi40.json" -o "$HADITH/qudsi40.json"
          python3 quran-offline/scripts/build_offline_assets.py --assets "$ASSETS" --pages "$PAGES" --qcf-pages "$QCF" --hadith "$HADITH"
          python3 quran-offline/scripts/curate_hadith.py "$ASSETS/hadith.json"

      - name: Resolve Adel Rayan source
        shell: bash
        run: |
          set -euxo pipefail
          DATA="quran-offline/build-data"
          mkdir -p "$DATA"
          curl -fsSL --retry 8 --retry-all-errors -A "Mozilla/5.0" \
            "https://www.mp3quran.net/api/v3/reciters?language=ar" -o "$DATA/mp3quran-reciter-list.json"
          python3 - <<'PY'
          import json, re, unicodedata
          from pathlib import Path
          data=json.loads(Path('quran-offline/build-data/mp3quran-reciter-list.json').read_text(encoding='utf-8'))
          def norm(v):
              v=unicodedata.normalize('NFKD',str(v or ''))
              v=''.join(c for c in v if not unicodedata.combining(c))
              v=re.sub(r'[^\u0621-\u064A]+','',v)
              return v.replace('أ','ا').replace('إ','ا').replace('آ','ا').replace('ى','ي')
          selected=None
          for reciter in data.get('reciters',[]):
              if norm(reciter.get('name'))!=norm('عادل ريان'): continue
              for moshaf in reciter.get('moshaf',[]):
                  surahs={int(x) for x in str(moshaf.get('surah_list','')).split(',') if x.strip().isdigit()}
                  if int(moshaf.get('surah_total') or 0)==114 and surahs==set(range(1,115)):
                      selected=(reciter,moshaf);break
              if selected: break
          if not selected: raise RuntimeError('No complete Adel Rayan Mushaf found')
          reciter,moshaf=selected
          server=str(moshaf['server']).strip()
          if not server.endswith('/'): server+='/'
          Path('quran-offline/build-data/adel-source.env').write_text(
              f"ADEL_SERVER={server}\nRECITER_API_NAME={reciter['name']}\nRECITER_MOSHAF={moshaf['name']}\n",encoding='utf-8')
          print(server)
          PY
          cat "$DATA/adel-source.env" >> "$GITHUB_ENV"

      - name: Download and inspect all source Surahs
        shell: bash
        run: |
          set -euxo pipefail
          SOURCE="quran-offline/build-data/adel-rayan-source"
          rm -rf "$SOURCE" && mkdir -p "$SOURCE"
          export SOURCE ADEL_SERVER
          seq -w 1 114 | xargs -P 4 -I{} bash -c '
            set -euo pipefail
            N="{}"; INPUT="$SOURCE/$N.source"; URL="${ADEL_SERVER}${N}.mp3"
            curl -fL --retry 8 --retry-all-errors --connect-timeout 20 --max-time 1800 -A "Mozilla/5.0" "$URL" -o "$INPUT"
            test -s "$INPUT"
            ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$INPUT" >/dev/null
            printf "%s" "$URL" > "$SOURCE/$N.url"
          '
          test "$(find "$SOURCE" -type f -name '*.source' | wc -l)" -eq 114

      - name: Plan matching compact Opus quality
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import json,subprocess
          from pathlib import Path
          source=Path('quran-offline/build-data/adel-rayan-source')
          durations=[]
          for n in range(1,115):
              data=json.loads(subprocess.check_output(['ffprobe','-v','error','-show_entries','format=duration','-of','json',str(source/f'{n:03d}.source')],text=True))
              durations.append(float(data['format']['duration']))
          total=sum(durations)
          if not 20*3600<total<40*3600: raise RuntimeError(total)
          bitrate=round(((112*1024*1024)*8/total)/100)*100
          bitrate=max(10000,min(14000,bitrate))
          Path('quran-offline/build-data/audio-plan.env').write_text(f'OPUS_BITRATE={bitrate}\nTOTAL_SOURCE_SECONDS={total:.6f}\n',encoding='utf-8')
          print('hours=',total/3600,'bitrate=',bitrate)
          PY
          cat quran-offline/build-data/audio-plan.env >> "$GITHUB_ENV"

      - name: Encode built-in Surahs covering first five Juz
        shell: bash
        run: |
          set -euxo pipefail
          SOURCE="quran-offline/build-data/adel-rayan-source"
          AUDIO="quran-offline/app/src/main/assets/quran-audio"
          rm -rf "$AUDIO" && mkdir -p "$AUDIO"
          export SOURCE AUDIO OPUS_BITRATE
          seq -w 1 4 | xargs -P 4 -I{} bash -c '
            set -euo pipefail
            N="{}"; TMP="$AUDIO/$N.tmp.ogg"
            ffmpeg -nostdin -hide_banner -loglevel error -y -i "$SOURCE/$N.source" \
              -map_metadata -1 -vn -ac 1 -ar 24000 -c:a libopus -application audio \
              -frame_duration 40 -b:a "$OPUS_BITRATE" -vbr on -compression_level 10 \
              -packet_loss 0 -fec 0 "$TMP"
            test -s "$TMP"; mv "$TMP" "$AUDIO/$N.ogg"
          '
          test "$(find "$AUDIO" -type f -name '*.ogg' | wc -l)" -eq 4

      - name: Build verified download manifest and validate audio
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          import hashlib,json,subprocess
          from pathlib import Path
          source=Path('quran-offline/build-data/adel-rayan-source')
          audio=Path('quran-offline/app/src/main/assets/quran-audio')
          assets=Path('quran-offline/app/src/main/assets')
          def duration(path):
              d=json.loads(subprocess.check_output(['ffprobe','-v','error','-show_entries','format=duration','-of','json',str(path)],text=True))
              return float(d['format']['duration'])
          items=[]
          for n in range(1,115):
              src=source/f'{n:03d}.source'
              if src.stat().st_size<10000: raise RuntimeError(src)
              items.append({'surah':n,'url':(source/f'{n:03d}.url').read_text(),'bytes':src.stat().st_size,'sha256':hashlib.sha256(src.read_bytes()).hexdigest(),'duration':duration(src)})
          built=[]
          for n in range(1,5):
              out=audio/f'{n:03d}.ogg'
              subprocess.check_call(['ffmpeg','-nostdin','-hide_banner','-loglevel','error','-i',str(out),'-f','null','-'])
              if abs(duration(out)-items[n-1]['duration'])>.25: raise RuntimeError(f'duration mismatch {n}')
              built.append({'surah':n,'bytes':out.stat().st_size,'sha256':hashlib.sha256(out.read_bytes()).hexdigest(),'duration':duration(out)})
          built_bytes=sum(x['bytes'] for x in built)
          if not 10*1048576<built_bytes<30*1048576: raise RuntimeError(f'Unexpected built-in audio size {built_bytes/1048576:.2f} MiB')
          manifest={'reciter':'عادل ريان','built_in_surahs':[1,2,3,4],'built_in_covers_juz':5,'note':'Surah An-Nisa is included completely to avoid cutting a Surah at the end of Juz 5.','surahs':items}
          (assets/'audio-download-manifest.json').write_text(json.dumps(manifest,ensure_ascii=False,indent=2),encoding='utf-8')
          (assets/'quran-audio-manifest.json').write_text(json.dumps({'reciter':'عادل ريان','built_in_surahs':built,'total_bytes':built_bytes},ensure_ascii=False,indent=2),encoding='utf-8')
          print('built_in_audio_MiB=',built_bytes/1048576)
          PY
          cat > quran-offline/app/src/main/assets/AUDIO_SOURCE_NOTICE.txt <<'NOTICE'
          Built-in audio contains Surahs 1-4. Other Surahs are downloaded only when the user taps Download, verified by SHA-256, and stored in the app-specific music directory. Source: MP3Quran Adel Rayan Mushaf. Confirm redistribution permission before public or commercial release.
          NOTICE

      - name: Validate essential v4.14 files and compact targets
        shell: bash
        run: |
          set -euxo pipefail
          ASSETS="quran-offline/app/src/main/assets"
          for file in app-v11.js app-v12.js app-v13.js app-v14.js app-v15.js app-v16.js app-v17.js; do node --check "$ASSETS/$file"; done
          test "$(find "$ASSETS/mushaf-pages" -name 'page*.webp' | wc -l)" -eq 604
          test ! -d "$ASSETS/mushaf-pages-blue"
          test ! -d "$ASSETS/mushaf-pages-gold"
          test "$(find "$ASSETS/quran-audio" -name '*.ogg' | wc -l)" -eq 4
          test -s "$ASSETS/audio-download-manifest.json"
          test -s "$ASSETS/quran-audio-manifest.json"
          test -s "$ASSETS/quran.json"
          test -s "$ASSETS/hadith.json"
          test -s quran-offline/app/src/main/res/raw/adhan_short.ogg
          grep -q 'app-v17.js' "$ASSETS/app-v7.js"
          grep -q 'app-v17.css' "$ASSETS/app-v7.js"
          grep -q "versionCode 18" quran-offline/app/build.gradle
          grep -q "versionName '4.14.0'" quran-offline/app/build.gradle
          grep -q "applicationId 'com.mastermedia.quranoffline.lite'" quran-offline/app/build.gradle
          grep -q 'android.permission.INTERNET' quran-offline/app/src/main/AndroidManifest.xml
          grep -q 'AudioDownloadServiceV414' quran-offline/app/src/main/AndroidManifest.xml
          python3 - <<'PY'
          import json
          from pathlib import Path
          a=Path('quran-offline/app/src/main/assets')
          m=json.load(open(a/'audio-download-manifest.json',encoding='utf-8'))
          assert m['built_in_surahs']==[1,2,3,4] and len(m['surahs'])==114
          pages=sum(p.stat().st_size for p in (a/'mushaf-pages').glob('*.webp'))
          audio=sum(p.stat().st_size for p in (a/'quran-audio').glob('*.ogg'))
          print('mushaf_MiB=',pages/1048576,'built_in_audio_MiB=',audio/1048576)
          assert pages<45*1048576
          assert audio<30*1048576
          PY

      - name: Build optimized release APK
        working-directory: quran-offline
        run: gradle :app:assembleRelease --stacktrace

      - name: Zipalign, sign when release secrets exist, and verify
        id: package
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BT="$ANDROID_HOME/build-tools/35.0.0"
          UNSIGNED="quran-offline/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="$RUNNER_TEMP/Rafiq-AlHuda-v4.14-Compact-aligned-unsigned.apk"
          SIGNED="Rafiq-AlHuda-v4.14-Compact.apk"
          UNSIGNED_FINAL="Rafiq-AlHuda-v4.14-Compact-unsigned-aligned.apk"
          test -f "$UNSIGNED"
          unzip -t "$UNSIGNED" >/dev/null
          "$BT/zipalign" -f -p 4 "$UNSIGNED" "$ALIGNED"
          "$BT/zipalign" -c -v 4 "$ALIGNED"
          if [ -n "$RELEASE_KEYSTORE_BASE64" ] && [ -n "$RELEASE_KEYSTORE_PASSWORD" ] && [ -n "$RELEASE_KEY_ALIAS" ] && [ -n "$RELEASE_KEY_PASSWORD" ]; then
            KEYSTORE="$RUNNER_TEMP/release-keystore.p12"
            printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
            "$BT/apksigner" sign --ks "$KEYSTORE" --ks-pass "pass:$RELEASE_KEYSTORE_PASSWORD" --ks-key-alias "$RELEASE_KEY_ALIAS" --key-pass "pass:$RELEASE_KEY_PASSWORD" --out "$SIGNED" "$ALIGNED"
            "$BT/apksigner" verify --verbose --print-certs "$SIGNED" | tee signing-report.txt
            FINAL_PATH="$SIGNED"; SIGNED_STATE=true; rm -f "$KEYSTORE"
          else
            cp "$ALIGNED" "$UNSIGNED_FINAL"
            printf '%s\n' 'NOT SIGNED: sign locally with the existing private key.' | tee signing-report.txt
            FINAL_PATH="$UNSIGNED_FINAL"; SIGNED_STATE=false
          fi
          unzip -t "$FINAL_PATH" >/dev/null
          unzip -l "$FINAL_PATH" > apk-contents.txt
          grep -q 'assets/quran-audio/001.ogg' apk-contents.txt
          grep -q 'assets/quran-audio/004.ogg' apk-contents.txt
          ! grep -q 'assets/quran-audio/005.ogg' apk-contents.txt
          grep -q 'assets/audio-download-manifest.json' apk-contents.txt
          grep -q 'assets/mushaf-pages/page604.webp' apk-contents.txt
          grep -q 'assets/app-v17.js' apk-contents.txt
          BYTES=$(stat -c %s "$FINAL_PATH")
          test "$BYTES" -lt $((130*1024*1024))
          sha256sum "$FINAL_PATH" | tee SHA256SUMS.txt
          printf 'APK bytes: %s\n' "$BYTES" | tee APK-SIZE.txt
          echo "final_path=$FINAL_PATH" >> "$GITHUB_OUTPUT"
          echo "signed=$SIGNED_STATE" >> "$GITHUB_OUTPUT"

      - name: Upload verified APK build
        uses: actions/upload-artifact@v4
        with:
          name: Rafiq-AlHuda-v4.14-Compact-Downloadable-Audio-Build
          path: |
            ${{ steps.package.outputs.final_path }}
            SHA256SUMS.txt
            APK-SIZE.txt
            signing-report.txt
            quran-offline/app/src/main/assets/quran-audio-manifest.json
            quran-offline/app/src/main/assets/audio-download-manifest.json
          if-no-files-found: error
          retention-days: 30
