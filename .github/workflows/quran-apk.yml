name: Build Rafiq Al-Huda Official APK

on:
  workflow_dispatch:
  push:
    branches: ["agent/rafiq-alhuda-official-v4"]
    paths:
      - "quran-offline/**"
      - ".github/workflows/quran-apk.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "quran-offline/**"
      - ".github/workflows/quran-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK and image tools
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          sudo apt-get update -qq
          sudo apt-get install -y webp

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Download verified offline sources and real Mushaf pages
        shell: bash
        run: |
          set -euxo pipefail
          ASSETS="quran-offline/app/src/main/assets"
          PAGES="quran-offline/build-data/pages"
          QCF="quran-offline/build-data/qcf-pages"
          HADITH="quran-offline/build-data/hadith"
          MUSHAF="$ASSETS/mushaf-pages"
          MUSHAF_TMP="quran-offline/build-data/mushaf-png"
          mkdir -p "$ASSETS/fonts" "$PAGES" "$QCF" "$HADITH" "$MUSHAF" "$MUSHAF_TMP"
          rm -rf "$ASSETS/fonts/qcf-v2"
          rm -f "$ASSETS/quran.json" "$ASSETS/quran_pages.json" "$ASSETS/quran_mushaf.json" "$ASSETS/hadith.json" "$ASSETS/adhan.umd.min.js"
          rm -f "$PAGES"/*.json "$QCF"/*.json "$MUSHAF"/*.webp "$MUSHAF_TMP"/*.png

          curl -fL --retry 4 --retry-all-errors \
            "https://cdn.jsdelivr.net/npm/quran-json@3.1.2/dist/quran.json" \
            -o "$ASSETS/quran.json"
          curl -fL --retry 4 --retry-all-errors \
            "https://unpkg.com/adhan@4.4.4/lib/bundles/adhan.umd.min.js" \
            -o "$ASSETS/adhan.umd.min.js"

          export PAGES
          seq 1 604 | xargs -P 20 -I{} bash -c '
            set -e
            curl -fsSL --retry 5 --retry-all-errors \
              "https://cdn.jsdelivr.net/gh/fawazahmed0/quran-api@1/editions/ara-quranacademy/pages/{}.json" \
              -o "$PAGES/{}.json"
          '
          test "$(find "$PAGES" -type f -name "*.json" | wc -l)" -eq 604

          export QCF
          seq 1 604 | xargs -P 12 -I{} bash -c '
            set -e
            curl -fsSL --retry 6 --retry-all-errors \
              "https://api.quran.com/api/v4/verses/by_page/{}?language=ar&words=true&word_fields=text_qpc_hafs,text_uthmani&fields=juz_number&per_page=50" \
              -o "$QCF/{}.json"
          '
          test "$(find "$QCF" -type f -name "*.json" | wc -l)" -eq 604

          export MUSHAF MUSHAF_TMP
          seq 1 604 | xargs -P 12 -I{} bash -c '
            set -euo pipefail
            number=$(printf "%03d" {})
            target="$MUSHAF_TMP/page${number}.png"
            if ! curl -fsSL --retry 6 --retry-all-errors \
              "https://android.quran.com/data/width_1260/page${number}.png" -o "$target"; then
              curl -fsSL --retry 6 --retry-all-errors \
                "http://android.quran.com/data/width_1260/page${number}.png" -o "$target"
            fi
            test -s "$target"
            cwebp -quiet -q 82 -m 6 -resize 1000 0 "$target" -o "$MUSHAF/page${number}.webp"
            test -s "$MUSHAF/page${number}.webp"
          '
          test "$(find "$MUSHAF" -type f -name "page*.webp" | wc -l)" -eq 604
          du -sh "$MUSHAF"

          python3 - <<'PY'
          from pathlib import Path
          root=Path('quran-offline/app/src/main/assets/mushaf-pages')
          files=sorted(root.glob('page*.webp'))
          assert len(files)==604, len(files)
          assert files[0].name=='page001.webp' and files[-1].name=='page604.webp'
          assert min(p.stat().st_size for p in files)>5000
          total=sum(p.stat().st_size for p in files)
          assert total < 95*1024*1024, total
          print('Real Mushaf images:',len(files),'total bytes:',total)
          PY

          curl -fL --retry 6 --retry-all-errors \
            "https://verses.quran.foundation/fonts/quran/hafs/uthmanic_hafs/UthmanicHafs1Ver18.ttf" \
            -o "$ASSETS/fonts/UthmanicHafs1Ver18.ttf"
          test -s "$ASSETS/fonts/UthmanicHafs1Ver18.ttf"

          BASE="https://raw.githubusercontent.com/AhmedBaset/hadith-json/v1.2.0/db/by_book"
          curl -fL --retry 5 --retry-all-errors "$BASE/the_9_books/bukhari.json" -o "$HADITH/bukhari.json"
          curl -fL --retry 5 --retry-all-errors "$BASE/the_9_books/muslim.json" -o "$HADITH/muslim.json"
          curl -fL --retry 5 --retry-all-errors "$BASE/forties/nawawi40.json" -o "$HADITH/nawawi40.json"
          curl -fL --retry 5 --retry-all-errors "$BASE/forties/qudsi40.json" -o "$HADITH/qudsi40.json"

      - name: Build and validate offline data
        run: |
          set -euxo pipefail
          python3 quran-offline/scripts/build_offline_assets.py \
            --assets quran-offline/app/src/main/assets \
            --pages quran-offline/build-data/pages \
            --qcf-pages quran-offline/build-data/qcf-pages \
            --hadith quran-offline/build-data/hadith
          node --check quran-offline/app/src/main/assets/app-v2.js
          node --check quran-offline/app/src/main/assets/app-v3.js
          node --check quran-offline/app/src/main/assets/app-v4.js
          node --check quran-offline/app/src/main/assets/app-v6.js
          node --check quran-offline/app/src/main/assets/app-v7.js
          node --check quran-offline/app/src/main/assets/app-v8.js
          node --check quran-offline/app/src/main/assets/app-v9.js
          node --check quran-offline/app/src/main/assets/app-v10.js
          node --check quran-offline/app/src/main/assets/app-v11.js
          python3 - <<'PY'
          import json
          from pathlib import Path
          assets=Path('quran-offline/app/src/main/assets')
          pages=json.load(open(assets/'quran_pages.json',encoding='utf-8'))
          hadith=json.load(open(assets/'hadith.json',encoding='utf-8'))
          images=sorted((assets/'mushaf-pages').glob('page*.webp'))
          assert len(pages)==604
          assert sum(len(p['v']) for p in pages)==6236
          assert len(hadith)>=6000
          assert len(images)==604
          loader=(assets/'app-v7.js').read_text(encoding='utf-8')
          js=(assets/'app-v11.js').read_text(encoding='utf-8')
          css=(assets/'app-v11.css').read_text(encoding='utf-8')
          assert 'app-v11.js' in loader and 'app-v11.css' in loader
          for token in ('mushaf-pages/page','image-mushaf-stage','circularSmooth','renderImages'):
              assert token in js or token in css, token
          assert 'rotateY(' not in js and 'perspective(' not in js
          print('Offline v4.4 validated:',len(images),'real Mushaf images and',len(hadith),'hadiths')
          PY

      - name: Build optimized unsigned Release APK
        working-directory: quran-offline
        run: gradle :app:assembleRelease --stacktrace

      - name: Verify unsigned APK and size
        run: |
          set -euxo pipefail
          APK="quran-offline/app/build/outputs/apk/release/app-release-unsigned.apk"
          test -f "$APK"
          unzip -t "$APK" >/dev/null
          SIZE=$(stat -c%s "$APK")
          echo "Unsigned APK bytes: $SIZE"
          test "$SIZE" -lt 104857600
          cp "$APK" Rafiq-AlHuda-v4.4-Image-Mushaf-unsigned.apk
          sha256sum Rafiq-AlHuda-v4.4-Image-Mushaf-unsigned.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Rafiq-AlHuda-v4.4-Image-Mushaf-Unsigned-APK
          path: Rafiq-AlHuda-v4.4-Image-Mushaf-unsigned.apk
          retention-days: 30

      - name: Package Android signing tools
        run: |
          set -euxo pipefail
          BT="$ANDROID_HOME/build-tools/35.0.0"
          mkdir -p android-sign-tools/lib android-sign-tools/lib64
          cp "$BT/apksigner" android-sign-tools/
          cp "$BT/zipalign" android-sign-tools/
          cp "$BT/lib/apksigner.jar" android-sign-tools/lib/
          if [ -f "$BT/lib64/libc++.so" ]; then cp "$BT/lib64/libc++.so" android-sign-tools/lib64/; fi
          chmod +x android-sign-tools/apksigner android-sign-tools/zipalign
          ./android-sign-tools/apksigner version

      - uses: actions/upload-artifact@v4
        with:
          name: Android-Build-Tools-35-Signing
          path: android-sign-tools
          retention-days: 7
