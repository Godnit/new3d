name: Build AR Hand Studio APK

on:
  push:
    branches: ["ar-hand-studio-v1"]
  pull_request:
    branches: ["main", "ar-hand-studio-v1"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Build debug APK
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle :app:assembleDebug --stacktrace 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AR-Hand-Studio-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: AR-Hand-Studio-v1-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Fail when compilation failed
        if: steps.build.outcome != 'success'
        run: exit 1
