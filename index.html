<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مشغل ألعاب HTML</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            background-color: #000; 
            color: white; 
            overflow: hidden; /* الأهم: يمنع التمرير والتقطيع الناتج عنه */
            font-family: sans-serif; 
        }
        
        #main-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100%; width: 100%; background-color: #1a1a1a; 
        }
        
        .btn-upload { 
            background-color: #3b82f6; padding: 15px 30px; border-radius: 8px; 
            border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; 
        }

        #player-screen { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; 
        }
        
        #start-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; 
        }
        
        .btn-start { 
            background-color: #10b981; padding: 20px 40px; border-radius: 8px; 
            border: none; color: white; font-weight: bold; font-size: 20px; cursor: pointer; 
        }

        /* iframe بسيط وبدون خصائص معقدة */
        #game-frame {
            width: 100%; height: 100%; border: none; display: block; background-color: #000;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <h2>مشغل الألعاب</h2>
        <br>
        <input type="file" id="file-upload" accept=".html" style="display:none" />
        <button class="btn-upload" onclick="document.getElementById('file-upload').click()">اختيار ملف اللعبة</button>
    </div>

    <div id="player-screen">
        <div id="start-overlay">
            <button class="btn-start" id="btn-start">ابدأ اللعب</button>
        </div>
        
        <!-- تمت إزالة sandbox بالكامل لفك القيود عن المعالج (JIT Compiler) -->
        <iframe id="game-frame" allow="fullscreen; autoplay; keyboard; gamepad; camera; microphone; geolocation" allowfullscreen="true"></iframe>
    </div>

    <script>
        const fileUpload = document.getElementById('file-upload');
        const mainScreen = document.getElementById('main-screen');
        const playerScreen = document.getElementById('player-screen');
        const startOverlay = document.getElementById('start-overlay');
        const btnStart = document.getElementById('btn-start');
        const gameFrame = document.getElementById('game-frame');

        let lastBackPress = 0;
        let gameUrl = null; // إضافة متغير لحفظ الرابط الوهمي للعبة في الذاكرة

        fileUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    const htmlContent = event.target.result;
                    
                    // إظهار شاشة اللعب
                    mainScreen.style.display = 'none';
                    playerScreen.style.display = 'block';
                    startOverlay.style.display = 'flex';
                    
                    // استخدام Blob URL بدلاً من document.write
                    // هذه الطريقة تتجاوز قيود السرعة التي يفرضها المتصفح على الملفات المحلية (file://)
                    // وتسمح باستخدام كارت الشاشة لتسريع اللعبة
                    if (gameUrl) URL.revokeObjectURL(gameUrl); // تنظيف الذاكرة القديمة
                    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
                    gameUrl = URL.createObjectURL(blob);
                    gameFrame.src = gameUrl;
                };
                
                // قراءة الملف كنص عادي
                reader.readAsText(file);
            }
        });

        btnStart.addEventListener('click', function() {
            startOverlay.style.display = 'none';
            
            const docElem = document.documentElement;
            try {
                if (docElem.requestFullscreen) {
                    docElem.requestFullscreen().catch(() => {});
                } else if (docElem.webkitRequestFullscreen) {
                    docElem.webkitRequestFullscreen();
                } else if (docElem.msRequestFullscreen) {
                    docElem.msRequestFullscreen();
                }
            } catch (error) {}
            
            // التركيز على اللعبة
            gameFrame.contentWindow.focus();
        });

        window.addEventListener('popstate', function(event) {
            const currentTime = new Date().getTime();
            
            if (playerScreen.style.display === 'block') {
                if (currentTime - lastBackPress < 2000) {
                    playerScreen.style.display = 'none';
                    mainScreen.style.display = 'flex';
                    
                    // تفريغ اللعبة من الذاكرة تماماً لتخفيف الحمل على الهاتف
                    gameFrame.src = 'about:blank';
                    if (gameUrl) {
                        URL.revokeObjectURL(gameUrl);
                        gameUrl = null;
                    }
                    
                    try {
                        if (document.fullscreenElement || document.webkitFullscreenElement) {
                            if (document.exitFullscreen) {
                                document.exitFullscreen().catch(() => {});
                            } else if (document.webkitExitFullscreen) {
                                document.webkitExitFullscreen();
                            }
                        }
                    } catch (error) {}
                    
                    fileUpload.value = '';
                    history.pushState(null, '', window.location.href);
                } else {
                    lastBackPress = currentTime;
                    alert("اضغط زر الرجوع مرة أخرى للخروج من اللعبة");
                    history.pushState(null, '', window.location.href);
                }
            } else {
                history.back();
            }
        });

        history.pushState(null, '', window.location.href);
    </script>
</body>
</html>
