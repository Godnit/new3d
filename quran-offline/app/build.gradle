plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mastermedia.quranoffline'
    compileSdk 35

    defaultConfig {
        applicationId 'com.mastermedia.quranoffline.lite'
        minSdk 26
        targetSdk 35
        versionCode 11
        versionName '4.7.0'
        resourceConfigurations += ['ar']
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            zipAlignEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    androidResources {
        noCompress += ['ogg']
    }

    packaging {
        resources {
            excludes += [
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE*',
                    'META-INF/NOTICE*',
                    'META-INF/*.kotlin_module'
            ]
        }
    }
}

dependencies {
}
